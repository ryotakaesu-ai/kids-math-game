<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>さんすう クイズ 🍎</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
  html, body {
    margin: 0; padding: 0;
    height: 100%;
    font-family: "Hiragino Maru Gothic ProN", "ヒラギノ丸ゴ ProN", "Yu Gothic", sans-serif;
    background: linear-gradient(180deg, #fff8d6 0%, #ffe0f0 50%, #d6f0ff 100%);
    overflow: hidden;
    touch-action: manipulation;
  }
  .app {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px;
    gap: 16px;
    position: relative;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    max-width: 560px;
  }
  .score {
    font-size: 28px;
    font-weight: 700;
    color: #ff7a00;
    background: #fff;
    padding: 8px 18px;
    border-radius: 999px;
    box-shadow: 0 4px 0 #ffc98a;
  }
  .stars {
    font-size: 24px;
    background: #fff;
    padding: 8px 14px;
    border-radius: 999px;
    box-shadow: 0 4px 0 #ffd96a;
    min-width: 120px;
    text-align: center;
    letter-spacing: 2px;
  }
  .mode-row {
    display: flex;
    gap: 10px;
  }
  .mode-btn {
    border: none;
    background: #fff;
    font-size: 20px;
    font-weight: 700;
    padding: 10px 18px;
    border-radius: 999px;
    box-shadow: 0 4px 0 #c8d8f0;
    cursor: pointer;
    color: #4a6aa8;
    font-family: inherit;
  }
  .mode-btn.active {
    background: #4a9aff;
    color: #fff;
    box-shadow: 0 4px 0 #2672d6;
  }
  .level-row {
    display: flex;
    gap: 8px;
  }
  .level-btn {
    border: none;
    background: #fff;
    font-size: 18px;
    font-weight: 700;
    padding: 8px 14px;
    border-radius: 999px;
    box-shadow: 0 3px 0 #f0c8d8;
    cursor: pointer;
    color: #d46693;
    font-family: inherit;
  }
  .level-btn.active {
    background: #ff8ab8;
    color: #fff;
    box-shadow: 0 3px 0 #d46693;
  }
  .question-card {
    flex: 1;
    width: 100%;
    max-width: 560px;
    background: #fff;
    border-radius: 28px;
    box-shadow: 0 8px 0 #ffc98a, 0 16px 40px rgba(0,0,0,0.08);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    gap: 18px;
    min-height: 300px;
  }
  .apples {
    font-size: clamp(36px, 9vw, 56px);
    line-height: 1.2;
    text-align: center;
    word-break: break-all;
  }
  .equation {
    font-size: clamp(44px, 11vw, 64px);
    font-weight: 900;
    color: #333;
    letter-spacing: 4px;
  }
  .answers {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    width: 100%;
    max-width: 560px;
  }
  .ans-btn {
    font-family: inherit;
    font-size: clamp(40px, 10vw, 56px);
    font-weight: 900;
    color: #fff;
    background: #ff8ab8;
    border: none;
    border-radius: 24px;
    padding: 22px 0;
    box-shadow: 0 6px 0 #d46693;
    cursor: pointer;
    transition: transform 0.08s, box-shadow 0.08s;
  }
  .ans-btn:nth-child(2) { background: #6ac8ff; box-shadow: 0 6px 0 #3d99d4; }
  .ans-btn:nth-child(3) { background: #ffc24d; box-shadow: 0 6px 0 #d49424; }
  .ans-btn:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 rgba(0,0,0,0.2);
  }
  .ans-btn.correct { animation: pop 0.5s; background: #4dd97a !important; box-shadow: 0 6px 0 #2ca551 !important; }
  .ans-btn.wrong { animation: shake 0.4s; background: #aaa !important; box-shadow: 0 6px 0 #777 !important; }
  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    75% { transform: translateX(8px); }
  }
  .feedback {
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-size: clamp(60px, 14vw, 110px);
    font-weight: 900;
    color: #ff5577;
    text-shadow: 4px 4px 0 #fff, 8px 8px 0 rgba(0,0,0,0.1);
    pointer-events: none;
    z-index: 100;
    white-space: nowrap;
  }
  .feedback.show { animation: bounce-in 1.2s; }
  @keyframes bounce-in {
    0% { transform: translate(-50%,-50%) scale(0) rotate(-20deg); opacity: 0; }
    30% { transform: translate(-50%,-50%) scale(1.3) rotate(10deg); opacity: 1; }
    50% { transform: translate(-50%,-50%) scale(1) rotate(-5deg); }
    70% { transform: translate(-50%,-50%) scale(1.1) rotate(3deg); opacity: 1; }
    100% { transform: translate(-50%,-50%) scale(0.8) rotate(0); opacity: 0; }
  }
  .confetti {
    position: absolute;
    top: -20px;
    font-size: 28px;
    pointer-events: none;
    z-index: 90;
    animation: fall linear forwards;
  }
  @keyframes fall {
    0% { transform: translateY(-20px) rotate(0); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0.8; }
  }
  .celebration {
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.92);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 200;
    padding: 20px;
    text-align: center;
  }
  .celebration.show { display: flex; animation: fade-in 0.4s; }
  @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
  .celebration h1 {
    font-size: clamp(40px, 10vw, 72px);
    color: #ff7a00;
    margin: 0;
    text-shadow: 3px 3px 0 #fff, 6px 6px 0 #ffc98a;
  }
  .celebration .big-stars {
    font-size: clamp(50px, 12vw, 90px);
    letter-spacing: 8px;
    animation: wobble 1.2s infinite;
  }
  @keyframes wobble {
    0%,100% { transform: rotate(-5deg); }
    50% { transform: rotate(5deg); }
  }
  .again-btn {
    font-family: inherit;
    font-size: 32px;
    font-weight: 900;
    color: #fff;
    background: #ff7a00;
    border: none;
    border-radius: 999px;
    padding: 18px 36px;
    box-shadow: 0 6px 0 #c45f00;
    cursor: pointer;
  }
  .again-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #c45f00; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="score" id="score">もんだい 1</div>
    <div class="stars" id="stars">⭐⭐⭐⭐⭐</div>
  </div>

  <div class="mode-row">
    <button class="mode-btn active" data-mode="add">たしざん</button>
    <button class="mode-btn" data-mode="sub">ひきざん</button>
    <button class="mode-btn" data-mode="count">かぞえる</button>
  </div>

  <div class="level-row">
    <button class="level-btn active" data-level="5">5さい</button>
    <button class="level-btn" data-level="6">6さい</button>
    <button class="level-btn" data-level="7">7さい ⭐</button>
  </div>

  <div class="question-card">
    <div class="apples" id="apples"></div>
    <div class="equation" id="equation"></div>
  </div>

  <div class="answers" id="answers"></div>

  <div class="feedback" id="feedback"></div>

  <div class="celebration" id="celebration">
    <div class="big-stars" id="bigStars">⭐⭐⭐⭐⭐</div>
    <h1 id="celebrationTitle">ぜんもん せいかい！</h1>
    <div style="font-size:28px; color:#555;">すごいね！ てんさい！</div>
    <button class="again-btn" onclick="resetAll()">もういちど あそぶ</button>
  </div>
</div>

<script>
// ===== 音 (Web Audio API) =====
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function beep(freqs, dur = 0.15, type = 'sine') {
  freqs.forEach((f, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = f;
    gain.gain.setValueAtTime(0.0001, audioCtx.currentTime + i * dur);
    gain.gain.exponentialRampToValueAtTime(0.3, audioCtx.currentTime + i * dur + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + (i + 1) * dur);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(audioCtx.currentTime + i * dur);
    osc.stop(audioCtx.currentTime + (i + 1) * dur);
  });
}
const sndCorrect = () => beep([523.25, 659.25, 783.99, 1046.50], 0.12, 'triangle');
const sndWrong   = () => beep([300, 200], 0.2, 'sawtooth');
const sndClap    = () => beep([523, 659, 784, 1046, 1319], 0.18, 'triangle');

// ===== ゲーム =====
const FRUITS = ['🍎', '🍓', '🍊', '🍇', '🍌', '🐶', '🐱', '🐰', '⭐', '🌸'];
const TOTAL_Q = 5;
let mode = 'add';
let level = 5;
let qIndex = 0;
let correctCount = 0;
let currentAnswer = 0;
let lockAnswers = false;

// レベルごとの数の範囲
const LEVEL_CONFIG = {
  5: {
    add:   { aMin: 1, aMax: 5,  bMin: 1, bMax: 5  },   // ~10まで
    sub:   { aMin: 3, aMax: 9,  bMin: 1 },             // ~9まで
    count: { min: 2, max: 9 },
    choiceRange: 3,
    useEmoji: true,
  },
  6: {
    add:   { aMin: 2, aMax: 9,  bMin: 2, bMax: 9  },   // くりあがり有
    sub:   { aMin: 6, aMax: 15, bMin: 2 },             // くりさがり有
    count: { min: 5, max: 15 },
    choiceRange: 4,
    useEmoji: true,
  },
  7: {
    add:   { aMin: 5, aMax: 20, bMin: 5, bMax: 20 },   // 2けた
    sub:   { aMin: 10, aMax: 30, bMin: 3 },
    count: { min: 10, max: 20 },
    choiceRange: 5,
    useEmoji: false,  // 数字だけ
  },
};

const $ = (id) => document.getElementById(id);

function randInt(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function makeQuestion() {
  lockAnswers = false;
  const fruit = pick(FRUITS);
  const cfg = LEVEL_CONFIG[level];
  let a, b, answer, appleStr, eqStr;

  if (mode === 'add') {
    a = randInt(cfg.add.aMin, cfg.add.aMax);
    b = randInt(cfg.add.bMin, cfg.add.bMax);
    answer = a + b;
    appleStr = cfg.useEmoji
      ? fruit.repeat(a) + '  ➕  ' + fruit.repeat(b)
      : '';
    eqStr = `${a} ＋ ${b} ＝ ？`;
  } else if (mode === 'sub') {
    a = randInt(cfg.sub.aMin, cfg.sub.aMax);
    b = randInt(cfg.sub.bMin, a - 1);
    answer = a - b;
    appleStr = cfg.useEmoji
      ? (a <= 15 ? fruit.repeat(a) + ' から ' + b + 'こ とる' : '')
      : '';
    eqStr = `${a} ー ${b} ＝ ？`;
  } else {
    // count
    a = randInt(cfg.count.min, cfg.count.max);
    answer = a;
    appleStr = fruit.repeat(a);
    eqStr = 'なんこ ある？';
  }

  currentAnswer = answer;
  $('apples').textContent = appleStr;
  $('apples').style.display = appleStr ? '' : 'none';
  $('equation').textContent = eqStr;

  // 選択肢 3つ（正解＋まちがい2つ）
  const range = cfg.choiceRange;
  const choices = new Set([answer]);
  while (choices.size < 3) {
    const w = answer + randInt(-range, range);
    if (w >= 0 && w !== answer) choices.add(w);
  }
  const shuffled = [...choices].sort(() => Math.random() - 0.5);

  const answersEl = $('answers');
  answersEl.innerHTML = '';
  shuffled.forEach((n) => {
    const btn = document.createElement('button');
    btn.className = 'ans-btn';
    btn.textContent = n;
    btn.onclick = () => handleAnswer(btn, n);
    answersEl.appendChild(btn);
  });

  $('score').textContent = `もんだい ${qIndex + 1} / ${TOTAL_Q}`;
}

function handleAnswer(btn, num) {
  if (lockAnswers) return;
  lockAnswers = true;
  // 音を鳴らすため一度 resume
  if (audioCtx.state === 'suspended') audioCtx.resume();

  if (num === currentAnswer) {
    btn.classList.add('correct');
    sndCorrect();
    showFeedback('せいかい！', '#4dd97a');
    confettiBurst();
    correctCount++;
    updateStars();
    setTimeout(() => {
      qIndex++;
      if (qIndex >= TOTAL_Q) showCelebration();
      else makeQuestion();
    }, 1200);
  } else {
    btn.classList.add('wrong');
    sndWrong();
    showFeedback('もういちど！', '#ff7777');
    setTimeout(() => {
      btn.classList.remove('wrong');
      lockAnswers = false;
    }, 900);
  }
}

function showFeedback(text, color) {
  const el = $('feedback');
  el.textContent = text;
  el.style.color = color;
  el.classList.remove('show');
  void el.offsetWidth; // reflow
  el.classList.add('show');
}

function updateStars() {
  const total = TOTAL_Q;
  const filled = '⭐'.repeat(correctCount);
  const empty = '☆'.repeat(total - correctCount);
  $('stars').textContent = filled + empty;
}

function confettiBurst() {
  const emojis = ['🎉','⭐','🌟','💖','✨','🎊'];
  for (let i = 0; i < 20; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';
    el.textContent = pick(emojis);
    el.style.left = Math.random() * 100 + 'vw';
    el.style.animationDuration = (1.5 + Math.random() * 1.5) + 's';
    el.style.fontSize = (20 + Math.random() * 20) + 'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }
}

function showCelebration() {
  sndClap();
  // 大量の紙吹雪
  for (let i = 0; i < 3; i++) setTimeout(confettiBurst, i * 300);
  $('bigStars').textContent = '⭐'.repeat(correctCount) + '☆'.repeat(TOTAL_Q - correctCount);
  let title = '';
  if (correctCount === TOTAL_Q) title = 'ぜんもん せいかい！';
  else if (correctCount >= 3) title = 'よく できました！';
  else title = 'がんばったね！';
  $('celebrationTitle').textContent = title;
  $('celebration').classList.add('show');
}

function resetAll() {
  qIndex = 0;
  correctCount = 0;
  updateStars();
  $('celebration').classList.remove('show');
  makeQuestion();
}

// モード切替
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    resetAll();
  };
});

// レベル切替
document.querySelectorAll('.level-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    level = parseInt(btn.dataset.level, 10);
    resetAll();
  };
});

// 初回
updateStars();
makeQuestion();

// iOSで音を解禁（最初のタップで）
document.body.addEventListener('touchstart', () => {
  if (audioCtx.state === 'suspended') audioCtx.resume();
}, { once: true });
</script>
</body>
</html>
