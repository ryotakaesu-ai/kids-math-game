<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>慣用句チャレンジ 📚</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
  html, body {
    margin: 0; padding: 0;
    min-height: 100vh;
    min-height: 100dvh;
    font-family: "Hiragino Sans", "ヒラギノ角ゴシック", "Yu Gothic", sans-serif;
    background: linear-gradient(160deg, #f7f1e3 0%, #f5d6c8 50%, #e8c5d5 100%);
    color: #2c2c3e;
    touch-action: manipulation;
  }
  .app {
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 10px max(10px, env(safe-area-inset-bottom));
    gap: 6px;
    position: relative;
    max-width: 560px;
    margin: 0 auto;
  }

  .top-row {
    display: flex;
    gap: 6px;
    width: 100%;
    align-items: stretch;
  }
  .back {
    display: flex;
    align-items: center;
    background: #fff;
    color: #a33333;
    text-decoration: none;
    font-size: clamp(12px, 3.2vw, 14px);
    padding: 0 12px;
    border-radius: 12px;
    border: 1px solid rgba(0,0,0,0.08);
    white-space: nowrap;
    flex-shrink: 0;
    box-shadow: 0 2px 0 rgba(0,0,0,0.06);
  }
  .status {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
    flex: 1;
    min-width: 0;
  }
  .stat {
    background: #fff;
    border: 1px solid rgba(0,0,0,0.06);
    border-radius: 12px;
    padding: 5px 4px;
    text-align: center;
    box-shadow: 0 2px 0 rgba(0,0,0,0.06);
    min-width: 0;
  }
  .stat-label {
    font-size: clamp(9px, 2.6vw, 11px);
    color: #888;
    letter-spacing: 1px;
  }
  .stat-value {
    font-size: clamp(15px, 4.4vw, 20px);
    font-weight: 900;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  .stat.score  .stat-value { color: #b9932e; }
  .stat.streak .stat-value { color: #e2691f; }
  .stat.prog   .stat-value { color: #2c3e70; }

  .modes {
    display: flex;
    gap: 5px;
    width: 100%;
  }
  .mode-btn {
    flex: 1;
    min-width: 0;
    background: #fff;
    border: 1px solid rgba(0,0,0,0.08);
    color: #666;
    font-family: inherit;
    font-size: clamp(12px, 3.4vw, 14px);
    font-weight: 700;
    padding: 8px 2px;
    border-radius: 10px;
    cursor: pointer;
    white-space: nowrap;
    box-shadow: 0 2px 0 rgba(0,0,0,0.06);
  }
  .mode-btn.active {
    background: linear-gradient(135deg, #a33333, #d4574a);
    color: #fff;
    border-color: transparent;
    box-shadow: 0 2px 0 #7a2525;
  }

  .question-card {
    width: 100%;
    flex: 1 1 auto;
    background: #fff;
    border-radius: 20px;
    border: 1px solid rgba(0,0,0,0.06);
    box-shadow: 0 4px 0 rgba(0,0,0,0.06), 0 8px 30px rgba(163,51,51,0.1);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 14px 16px;
    gap: 8px;
    min-height: 0;
    position: relative;
    overflow: hidden;
  }
  .q-label {
    font-size: clamp(11px, 3vw, 13px);
    color: #a33333;
    letter-spacing: 2px;
    font-weight: 700;
  }
  .q-text {
    font-family: "Hiragino Mincho ProN", "游明朝", "Yu Mincho", serif;
    font-size: clamp(24px, 6.5vw, 36px);
    font-weight: 700;
    color: #1a2b4a;
    text-align: center;
    line-height: 1.3;
    padding: 0 8px;
  }
  .q-category {
    font-size: 11px;
    color: #999;
    background: #f5f0e6;
    padding: 2px 10px;
    border-radius: 999px;
  }

  .choices {
    display: grid;
    grid-template-columns: 1fr;
    gap: 6px;
    width: 100%;
    flex-shrink: 0;
  }
  .choice {
    background: #fff;
    border: 2px solid rgba(0,0,0,0.08);
    color: #2c2c3e;
    font-family: inherit;
    font-size: clamp(14px, 4vw, 17px);
    font-weight: 600;
    padding: 12px 14px;
    border-radius: 12px;
    cursor: pointer;
    text-align: left;
    box-shadow: 0 3px 0 rgba(0,0,0,0.08);
    transition: transform 0.08s;
    line-height: 1.35;
  }
  .choice:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.08); }
  .choice.correct {
    background: linear-gradient(135deg, #4dd97a, #6adfff);
    color: #fff;
    border-color: transparent;
  }
  .choice.wrong {
    background: #e74c3c;
    color: #fff;
    border-color: transparent;
  }
  .choice.dim { opacity: 0.5; }
  .choice .num {
    display: inline-block;
    width: 22px;
    height: 22px;
    background: #f5f0e6;
    color: #a33333;
    border-radius: 50%;
    text-align: center;
    font-size: 13px;
    line-height: 22px;
    margin-right: 8px;
    font-weight: 900;
  }
  .choice.correct .num { background: rgba(255,255,255,0.3); color: #fff; }
  .choice.wrong .num { background: rgba(255,255,255,0.3); color: #fff; }

  .feedback {
    position: fixed;
    top: 45%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-size: clamp(44px, 12vw, 80px);
    font-weight: 900;
    pointer-events: none;
    z-index: 100;
    white-space: nowrap;
    text-shadow: 3px 3px 0 #fff, 6px 6px 0 rgba(0,0,0,0.15);
  }
  .feedback.show { animation: burst 0.9s; }
  @keyframes burst {
    0% { transform: translate(-50%,-50%) scale(0) rotate(-20deg); opacity: 0; }
    25% { transform: translate(-50%,-50%) scale(1.3) rotate(8deg); opacity: 1; }
    60% { transform: translate(-50%,-50%) scale(1) rotate(-3deg); opacity: 1; }
    100% { transform: translate(-50%,-50%) scale(0.7) rotate(0); opacity: 0; }
  }

  .score-pop {
    position: fixed;
    font-size: clamp(18px, 4.6vw, 24px);
    font-weight: 900;
    color: #b9932e;
    pointer-events: none;
    z-index: 99;
    text-shadow: 2px 2px 0 #fff;
    animation: float-up 1s forwards;
  }
  @keyframes float-up {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-60px); opacity: 0; }
  }

  .modal {
    position: fixed;
    inset: 0;
    background: rgba(30,20,40,0.85);
    backdrop-filter: blur(12px);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 20px;
    z-index: 200;
    text-align: center;
    color: #fff;
  }
  .modal.show { display: flex; animation: fade 0.3s; }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  .rank {
    font-size: clamp(70px, 20vw, 120px);
    font-weight: 900;
    line-height: 1;
    animation: rank-in 0.8s;
  }
  @keyframes rank-in {
    0% { transform: scale(0) rotate(-180deg); opacity: 0; }
    60% { transform: scale(1.2) rotate(10deg); }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }
  .rank.S { color: #ffd84d; text-shadow: 0 0 30px #ffd84d; }
  .rank.A { color: #ff9a4d; text-shadow: 0 0 20px #ff9a4d; }
  .rank.B { color: #6adfff; text-shadow: 0 0 20px #6adfff; }
  .rank.C { color: #c0c0c0; }
  .result-title {
    font-size: clamp(22px, 5.5vw, 28px);
    font-weight: 900;
    margin: 0;
  }
  .result-stats {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 16px;
    padding: 14px 24px;
    font-size: 16px;
    font-weight: 700;
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-width: 260px;
  }
  .result-stats .row {
    display: flex;
    justify-content: space-between;
    gap: 20px;
  }
  .result-stats .row span:last-child { color: #ffd84d; font-variant-numeric: tabular-nums; }
  .retry-btn {
    background: linear-gradient(135deg, #a33333, #d4574a);
    border: none;
    color: #fff;
    font-family: inherit;
    font-size: 20px;
    font-weight: 900;
    padding: 14px 32px;
    border-radius: 999px;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(163,51,51,0.4);
  }
  .retry-btn:active { transform: translateY(3px); }

  .particle {
    position: fixed;
    pointer-events: none;
    font-size: 22px;
    z-index: 95;
    animation: particle-fly 1s forwards;
  }
  @keyframes particle-fly {
    0% { opacity: 1; }
    100% { opacity: 0; transform: var(--end-transform); }
  }

  .progress-bar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: rgba(0,0,0,0.06);
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #a33333, #d4574a);
    transition: width 0.3s linear;
  }

  @media (max-height: 720px) {
    .choice { padding: 10px 12px; font-size: clamp(13px, 3.7vw, 16px); }
    .q-text { font-size: clamp(22px, 6vw, 32px); }
  }
</style>
</head>
<body>
<div class="app">
  <div class="top-row">
    <a href="index.html" class="back">←</a>
    <div class="status">
      <div class="stat prog">
        <div class="stat-label">もんだい</div>
        <div class="stat-value" id="prog">1/10</div>
      </div>
      <div class="stat score">
        <div class="stat-label">スコア</div>
        <div class="stat-value" id="score">0</div>
      </div>
      <div class="stat streak">
        <div class="stat-label">コンボ</div>
        <div class="stat-value"><span id="streak">0</span>🔥</div>
      </div>
    </div>
  </div>

  <div class="modes">
    <button class="mode-btn active" data-mode="meaning">意味あて</button>
    <button class="mode-btn" data-mode="idiom">慣用句あて</button>
    <button class="mode-btn" data-mode="mix">ミックス</button>
    <button class="mode-btn" data-mode="speed">スピード</button>
  </div>

  <div class="question-card" id="card">
    <div class="progress-bar"><div class="progress-bar-fill" id="progressBar" style="width:100%"></div></div>
    <div class="q-label" id="qLabel">この慣用句の意味は？</div>
    <div class="q-text" id="qText">頭が上がらない</div>
    <div class="q-category" id="qCategory">体</div>
  </div>

  <div class="choices" id="choices"></div>

  <div class="feedback" id="feedback"></div>

  <div class="modal" id="modal">
    <div class="rank" id="rank">S</div>
    <h2 class="result-title" id="resultTitle">クリア！</h2>
    <div class="result-stats">
      <div class="row"><span>スコア</span><span id="finalScore">0</span></div>
      <div class="row"><span>せいかい</span><span id="finalCorrect">0 / 10</span></div>
      <div class="row"><span>さいだい コンボ</span><span id="finalStreak">0 🔥</span></div>
    </div>
    <button class="retry-btn" onclick="startGame()">もういちど</button>
  </div>
</div>

<script>

// ===== 音 =====
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function beep(freqs, dur = 0.12, type = 'sine', vol = 0.25) {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  freqs.forEach((f, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = f;
    const t0 = audioCtx.currentTime + i * dur;
    gain.gain.setValueAtTime(0.0001, t0);
    gain.gain.exponentialRampToValueAtTime(vol, t0 + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(t0);
    osc.stop(t0 + dur);
  });
}
const sndCorrect = () => beep([523, 659, 784, 1046], 0.1, 'triangle', 0.3);
const sndCombo   = () => beep([784, 988, 1175, 1568], 0.08, 'triangle', 0.3);
const sndWrong   = () => beep([300, 200], 0.2, 'sawtooth', 0.25);
const sndVictory = () => beep([523, 659, 784, 1046, 1319, 1568, 2093], 0.12, 'triangle', 0.3);

// ===== 状態 =====
const TOTAL_NORMAL = 10;
const SPEED_TIME = 60;
let mode = 'meaning';
let qIndex = 0;
let score = 0;
let streak = 0;
let maxStreak = 0;
let correctCount = 0;
let currentItem = null;
let currentType = 'meaning'; // 'meaning' or 'idiom'
let locked = false;
let speedTimerId = null;
let speedLeft = SPEED_TIME;
let askedIds = new Set();

const $ = id => document.getElementById(id);
const shuffle = arr => {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
};
const pick = arr => arr[Math.floor(Math.random() * arr.length)];

function pickItem() {
  let pool = IDIOMS;
  // 出題済みは避ける（全部出たらリセット）
  const avail = pool.filter((_, i) => !askedIds.has(i));
  const source = avail.length > 3 ? avail : pool;
  if (avail.length <= 3) askedIds.clear();
  const idx = Math.floor(Math.random() * pool.length);
  // use index from original pool
  let chosenIdx;
  do {
    chosenIdx = Math.floor(Math.random() * pool.length);
  } while (askedIds.has(chosenIdx) && askedIds.size < pool.length);
  askedIds.add(chosenIdx);
  return { item: pool[chosenIdx], idx: chosenIdx };
}

function makeQuestion() {
  locked = false;
  const { item } = pickItem();
  currentItem = item;
  // モード決定
  if (mode === 'meaning') currentType = 'meaning';
  else if (mode === 'idiom') currentType = 'idiom';
  else if (mode === 'mix' || mode === 'speed') {
    currentType = Math.random() < 0.5 ? 'meaning' : 'idiom';
  }

  if (currentType === 'meaning') {
    $('qLabel').textContent = 'この慣用句の意味は？';
    $('qText').textContent = item.i;
  } else {
    $('qLabel').textContent = 'この意味にあう慣用句は？';
    $('qText').textContent = item.m;
  }
  $('qCategory').textContent = item.c;

  // 選択肢4つ（正解1 + 誤3）
  const wrongPool = IDIOMS.filter(x => x !== item);
  const wrongs = shuffle(wrongPool).slice(0, 3);
  const choices = shuffle([item, ...wrongs]);
  const answerField = currentType === 'meaning' ? 'm' : 'i';

  const container = $('choices');
  container.innerHTML = '';
  choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice';
    btn.innerHTML = `<span class="num">${i + 1}</span>${c[answerField]}`;
    btn.onclick = () => handleAnswer(btn, c === item);
    container.appendChild(btn);
  });
}

function handleAnswer(btn, isCorrect) {
  if (locked) return;
  locked = true;
  if (audioCtx.state === 'suspended') audioCtx.resume();

  const allBtns = document.querySelectorAll('.choice');

  if (isCorrect) {
    btn.classList.add('correct');
    allBtns.forEach(b => { if (b !== btn) b.classList.add('dim'); });
    correctCount++;
    streak++;
    if (streak > maxStreak) maxStreak = streak;
    const base = 100;
    const comboBonus = (streak - 1) * 30;
    const gained = base + comboBonus;
    animateScore(gained);
    if (streak >= 3) {
      sndCombo();
      showFeedback(`${streak} コンボ！`, '#e2691f');
    } else {
      sndCorrect();
      showFeedback('せいかい！', '#4dd97a');
    }
    burstParticles();
  } else {
    btn.classList.add('wrong');
    sndWrong();
    streak = 0;
    $('streak').textContent = streak;
    // 正解をハイライト
    allBtns.forEach(b => {
      if (b.textContent.includes(currentItem[currentType === 'meaning' ? 'm' : 'i'])) {
        b.classList.add('correct');
      }
    });
    showFeedback('ざんねん…', '#e74c3c');
  }

  const delay = mode === 'speed' ? 700 : 1300;
  setTimeout(nextQuestion, delay);
}

function animateScore(gained) {
  const target = score + gained;
  const start = score;
  const dur = 400;
  const t0 = performance.now();
  function step(now) {
    const p = Math.min(1, (now - t0) / dur);
    score = Math.round(start + (target - start) * p);
    $('score').textContent = score;
    if (p < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
  $('streak').textContent = streak;

  const pop = document.createElement('div');
  pop.className = 'score-pop';
  pop.textContent = `+${gained}`;
  const rect = $('card').getBoundingClientRect();
  pop.style.left = (rect.left + rect.width / 2 - 20) + 'px';
  pop.style.top = (rect.top + rect.height / 2) + 'px';
  document.body.appendChild(pop);
  setTimeout(() => pop.remove(), 1000);
}

function showFeedback(text, color) {
  const el = $('feedback');
  el.textContent = text;
  el.style.color = color;
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
}

function burstParticles() {
  const emojis = ['✨','⭐','🎉','💮','🌸'];
  const rect = $('card').getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  for (let i = 0; i < 10; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.textContent = emojis[i % emojis.length];
    p.style.left = cx + 'px';
    p.style.top = cy + 'px';
    const angle = (Math.PI * 2 * i) / 10;
    const dist = 70 + Math.random() * 50;
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist;
    p.style.setProperty('--end-transform', `translate(${dx}px, ${dy}px) rotate(${Math.random()*720}deg) scale(0.4)`);
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1000);
  }
}

function nextQuestion() {
  qIndex++;
  if (mode === 'speed') {
    $('prog').textContent = `${qIndex}問`;
    if (speedLeft <= 0) { endGame(); return; }
    makeQuestion();
    return;
  }
  if (qIndex >= TOTAL_NORMAL) { endGame(); return; }
  $('prog').textContent = `${qIndex + 1}/${TOTAL_NORMAL}`;
  makeQuestion();
}

function startSpeedTimer() {
  stopSpeedTimer();
  speedLeft = SPEED_TIME;
  $('prog').textContent = `${speedLeft}秒`;
  $('progressBar').style.width = '100%';
  speedTimerId = setInterval(() => {
    speedLeft--;
    $('prog').textContent = `${speedLeft}秒`;
    $('progressBar').style.width = (speedLeft / SPEED_TIME * 100) + '%';
    if (speedLeft <= 0) {
      stopSpeedTimer();
      endGame();
    }
  }, 1000);
}
function stopSpeedTimer() {
  if (speedTimerId) { clearInterval(speedTimerId); speedTimerId = null; }
}

function endGame() {
  stopSpeedTimer();
  sndVictory();
  const total = mode === 'speed' ? qIndex : TOTAL_NORMAL;
  let rank, title;
  if (mode === 'speed') {
    if (score >= 1500) { rank = 'S'; title = 'すごい！速読 達人！'; }
    else if (score >= 900) { rank = 'A'; title = 'よくできました！'; }
    else if (score >= 500) { rank = 'B'; title = 'いいペース！'; }
    else { rank = 'C'; title = 'つぎはもっと！'; }
  } else {
    const rate = correctCount / TOTAL_NORMAL;
    if (rate >= 0.9 && score >= 1300) { rank = 'S'; title = 'パーフェクト！'; }
    else if (rate >= 0.8) { rank = 'A'; title = 'すごい！'; }
    else if (rate >= 0.5) { rank = 'B'; title = 'いいね！'; }
    else { rank = 'C'; title = 'つぎはもっと！'; }
  }

  const rankEl = $('rank');
  rankEl.textContent = rank;
  rankEl.className = 'rank ' + rank;
  $('resultTitle').textContent = title;
  $('finalScore').textContent = score;
  $('finalCorrect').textContent = mode === 'speed' ? `${correctCount}問 せいかい` : `${correctCount} / ${TOTAL_NORMAL}`;
  $('finalStreak').textContent = `${maxStreak} 🔥`;
  $('modal').classList.add('show');
}

function startGame() {
  $('modal').classList.remove('show');
  qIndex = 0;
  score = 0;
  streak = 0;
  maxStreak = 0;
  correctCount = 0;
  locked = false;
  askedIds.clear();
  $('score').textContent = '0';
  $('streak').textContent = '0';
  if (mode === 'speed') {
    $('prog').textContent = `${SPEED_TIME}秒`;
    startSpeedTimer();
  } else {
    stopSpeedTimer();
    $('prog').textContent = `1/${TOTAL_NORMAL}`;
    $('progressBar').style.width = '100%';
  }
  makeQuestion();
}

// モード切替
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    startGame();
  };
});

// iOS音解禁
document.body.addEventListener('touchstart', () => {
  if (audioCtx.state === 'suspended') audioCtx.resume();
}, { once: true });

startGame();
</script>
